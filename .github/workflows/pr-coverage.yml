name: PR Code Coverage

on:
  pull_request:
    branches: [ "main", "release/*" ]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".vscode/*.json"
      - ".github/ISSUE_TEMPLATE/**"

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: pwsh

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Get changed Rust files
        id: changed
        run: |-
          $baseSha = '${{ github.event.pull_request.base.sha }}'
          $headSha = '${{ github.event.pull_request.head.sha }}'
          $changedFiles = git diff --name-only --diff-filter=ACMR "$baseSha...$headSha" -- '*.rs'
          if ($changedFiles) {
              $fileList = ($changedFiles | Where-Object { $_ }) -join ' '
              "files=$fileList" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "has_rust_changes=true" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          } else {
              "files=" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "has_rust_changes=false" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          }

      - name: Generate coverage report
        if: steps.changed.outputs.has_rust_changes == 'true'
        run: |-
          cargo llvm-cov --lcov --output-path lcov.info

      - name: Analyze coverage on changed files
        if: steps.changed.outputs.has_rust_changes == 'true'
        id: coverage
        run: |-
          $baseSha = '${{ github.event.pull_request.base.sha }}'
          $headSha = '${{ github.event.pull_request.head.sha }}'

          $totalChangedLines = 0
          $coveredLines = 0

          # Parse the LCOV file into a hashtable keyed by source file path
          $lcovData = @{}
          $currentFile = $null
          foreach ($line in Get-Content -Path 'lcov.info') {
              if ($line -match '^SF:(.+)$') {
                  $currentFile = $Matches[1]
                  $lcovData[$currentFile] = @{}
              } elseif ($line -match '^DA:(\d+),(\d+)' -and $currentFile) {
                  $lineNum = [int]$Matches[1]
                  $hitCount = [int]$Matches[2]
                  $lcovData[$currentFile][$lineNum] = $hitCount
              } elseif ($line -eq 'end_of_record') {
                  $currentFile = $null
              }
          }

          $changedFiles = '${{ steps.changed.outputs.files }}' -split '\s+'
          foreach ($file in $changedFiles) {
              if (-not $file -or -not (Test-Path $file)) {
                  continue
              }

              # Parse diff to get added line numbers in the new file
              $diffOutput = git diff "$baseSha...$headSha" -- $file
              $addedLineNumbers = @()
              $currentLineNum = 0

              foreach ($diffLine in $diffOutput) {
                  if ($diffLine -match '^@@\s+\-\d+(?:,\d+)?\s+\+(\d+)(?:,\d+)?\s+@@') {
                      $currentLineNum = [int]$Matches[1]
                  } elseif ($diffLine.StartsWith('+') -and -not $diffLine.StartsWith('+++')) {
                      $addedLineNumbers += $currentLineNum
                      $currentLineNum++
                  } elseif ($diffLine.StartsWith('-') -and -not $diffLine.StartsWith('---')) {
                      # Deleted lines don't advance the new file line counter
                  } else {
                      $currentLineNum++
                  }
              }

              # Find matching LCOV entry for this file
              $absPath = (Resolve-Path $file).Path
              $fileCoverage = $null
              foreach ($key in $lcovData.Keys) {
                  if ($key -eq $absPath -or $key.EndsWith("/$file") -or $key.EndsWith("\$file")) {
                      $fileCoverage = $lcovData[$key]
                      break
                  }
              }

              if ($fileCoverage) {
                  foreach ($lineNum in $addedLineNumbers) {
                      $totalChangedLines++
                      if ($fileCoverage.ContainsKey($lineNum) -and $fileCoverage[$lineNum] -gt 0) {
                          $coveredLines++
                      }
                  }
              } else {
                  # File not in coverage report - count added lines as uncovered
                  $totalChangedLines += $addedLineNumbers.Count
              }
          }

          if ($totalChangedLines -eq 0) {
              $percentage = 100
          } else {
              $percentage = [math]::Floor($coveredLines * 100 / $totalChangedLines)
          }

          "percentage=$percentage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          "covered=$coveredLines" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          "total=$totalChangedLines" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT

          # Determine emoji and label
          if ($percentage -eq 100) {
              "emoji=😲" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "label=100% coverage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          } elseif ($percentage -ge 90) {
              "emoji=😁" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "label=90%+ coverage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          } elseif ($percentage -ge 80) {
              "emoji=😊" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "label=80%+ coverage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          } elseif ($percentage -ge 70) {
              "emoji=😐" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "label=70%+ coverage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          } else {
              "emoji=😢" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
              "label=less than 70% coverage" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT
          }

      - name: Post coverage comment
        if: steps.changed.outputs.has_rust_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## ${{ steps.coverage.outputs.emoji }} Code Coverage Report

            **Changed code coverage: ${{ steps.coverage.outputs.percentage }}%** (${{ steps.coverage.outputs.label }})

            | Metric | Value |
            |--------|-------|
            | Changed lines analyzed | ${{ steps.coverage.outputs.total }} |
            | Lines covered by tests | ${{ steps.coverage.outputs.covered }} |
            | Coverage percentage | ${{ steps.coverage.outputs.percentage }}% |

            > Coverage is measured only on changed Rust code in this PR.

      - name: Post no-changes comment
        if: steps.changed.outputs.has_rust_changes == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## Code Coverage Report

            No Rust files were changed in this PR. Coverage analysis skipped.
