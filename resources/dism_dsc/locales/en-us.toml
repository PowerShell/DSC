[export]
failedParseInput = "Failed to parse input: %{err}"
failedSerializeOutput = "Failed to serialize output: %{err}"

[set]
failedParseInput = "Failed to parse input: %{err}"
featuresArrayEmpty = "Features array cannot be empty for set operation"
