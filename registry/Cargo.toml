[package]
name = "registry"
version = "1.0.0"
edition = "2021"

[package.metadata.i18n]
available-locales = ["en"]
default-locale = "en"
load-path = "locales"

[profile.release]
strip = true
# optimize for size
opt-level = 2
# enable link time optimization to remove dead code
lto = true

[profile.dev]
lto = true

[dependencies]
clap = { version = "4.5.20", features = ["derive"] }
crossterm = "0.28.1"
regex = "1.11.0"
registry = "1.2.3"
rust-i18n = "3"
schemars = "1.0.0-alpha.15"
serde = { version = "1.0.130", features = ["derive"] }
serde_json = "1.0.68"
thiserror = "1.0.64"
tracing = { version = "0.1.37" }
tracing-subscriber = { version = "0.3.17", features = ["ansi", "env-filter", "json"] }
utfx = "0.1.0"

[build-dependencies]
static_vcruntime = "2.0"
