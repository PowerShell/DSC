# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
$schema: https://json-schema.org/draft/2020-12/schema
$id:     <HOST>/<PREFIX>/<VERSION>/adaptedresource/manifest.yaml

title: DSC adapted resource manifest
description: >-
  Defines the information DSC requires to process and surface an adapted DSC resource. Adapted
  resources are discovered and invoked by an adapter, not directly by DSC.
markdownDescription: | # VS Code only
  ***
  [_Online Documentation_][01]
  ***

  Defines the information DSC requires to process and surface an adapted DSC resource. Adapted
  resources are discovered and invoked by an adapter, not directly by DSC. For DSC to use an
  adapted resource manifest on a system, the manifest file must:

  1. Be discoverable in the `PATH` environment variable.
  1. Follow the naming convention `<name>.dsc.adaptedResource.json`.
  1. Be valid for this schema.

  [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>

defaultSnippets:
  - label: ' Define an adapted resource'
    markdownDescription: |-
      Defines an adapted resource that is managed by an adapter. The adapter discovers and
      invokes the resource. The manifest pre-registers the resource so DSC can use it without
      running full adapter discovery.
    body:
      ${escape_dollar:$}schema: <HOST>/<PREFIX>/<VERSION>/bundled/adaptedresource/manifest.yaml
      type:                     '${1:owner.area.group}/${2:ResourceName}'
      kind:                      resource
      version:                  '${3:0.1.0}'
      capabilities:
        - ${4|get,set,test,export,delete|}
      description:               ${5:Synopsis for the adapted resource}
      author:                    ${6:Author name}
      requireAdapter:           '${7:Adapter/Name}'
      path:                      ${8:path/to/manifest.json}
      schema:
        embedded:
          ${escape_dollar:$}schema: ${9|https://json-schema.org/draft/2020-12/schema,https://json-schema.org/draft/2019-09/schema,http://json-schema.org/draft-07/schema#|}
          type:                     object
          properties:
            ${10:name}:
              title:       ${11:property title}
              description: ${12:explanation of property purpose and usage}
              type:        ${13|string,integer,number,array,object,null|}

type: object
required:
  - $schema
  - type
  - version
  - requireAdapter
  - schema
properties:
  $schema:
    title: Manifest Schema
    description: >-
      This property must be the canonical URL of the adapted resource manifest schema that the
      manifest is implemented for.
    type:   string
    format: uri
    enum:
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3/bundled/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3/bundled/adaptedresource/manifest.vscode.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1/bundled/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1/bundled/adaptedresource/manifest.vscode.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1.0/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1.0/bundled/adaptedresource/manifest.json
      - https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/v3.1.0/bundled/adaptedresource/manifest.vscode.json
      - https://aka.ms/dsc/schemas/v3/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3/bundled/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3/bundled/adaptedresource/manifest.vscode.json
      - https://aka.ms/dsc/schemas/v3.1/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3.1/bundled/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3.1/bundled/adaptedresource/manifest.vscode.json
      - https://aka.ms/dsc/schemas/v3.1.0/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3.1.0/bundled/adaptedresource/manifest.json
      - https://aka.ms/dsc/schemas/v3.1.0/bundled/adaptedresource/manifest.vscode.json
    # VS Code Only
    markdownDescription: |
      ***
      [_Online Documentation_][00]
      ***

      The `$schema` property indicates the canonical URI of this schema that the manifest validates
      against. This property is mandatory. DSC uses this value to validate the manifest against the
      correct JSON schema.

      The JSON schemas for DSC are published in multiple versions and forms. This documentation is
      for the latest version of the schema. As a convenience, you can specify either the full URI
      for the schema hosted in GitHub or use the shorter `aka.ms` URI. You can specify the schema
      for a specific semantic version, the latest schema for a minor version, or the latest schema
      for a major version of DSC. For more information about schema URIs and versioning, see
      [DSC JSON Schema URIs][01].
      
      For every version of the schema, there are three valid urls:

      ```yaml
      .../adaptedresource/manifest.json
      ```
      
      > The URL to the canonical non-bundled schema. When it's used for validation, the validating
      > client needs to retrieve this schema and every schema it references.

      ```yaml
      .../bundled/adaptedresource/manifest.json
      ```
      
      > The URL to the bundled schema. When it's used for validation, the validating client only
      > needs to retrieve this schema.
      > 
      > This schema uses the bundling model introduced for JSON Schema 2020-12. While DSC can
      > still validate the document when it uses this schema, other tools may error or behave
      > in unexpected ways.

      ```yaml
      .../bundled/adaptedresource/manifest.vscode.json
      ```
      
      > The URL to the enhanced authoring schema. This schema is much larger than the other
      > schemas, as it includes additional definitions that provide contextual help and snippets
      > that the others don't include.
      > 
      > This schema uses keywords that are only recognized by VS Code. While DSC can still
      > validate the document when it uses this schema, other tools may error or behave in
      > unexpected ways.

      [00]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#schema
      [01]: <DOCS_BASE_URL>/reference/schemas/schema-uris?<DOCS_VERSION_PIN>
