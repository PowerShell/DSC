  type:
    $ref: /<PREFIX>/<VERSION>/definitions/resourceType.yaml
  kind:
    title: Adapted Resource Kind
    description: >-
      Defines the kind of adapted resource. Adapted resources are always standard resources.
    type: string
    enum:
      - resource
    default: resource
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines the kind of adapted resource. Adapted resources are always standard resources managed
      by an adapter.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#kind
  version:
    title: Adapted Resource Semantic Version
    description: >-
      The semantic version (semver) of the adapted DSC resource.
    $ref: /<PREFIX>/<VERSION>/definitions/semver.yaml
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      The semantic version ([semver][02]) of the adapted DSC resource.

      This value uses the [suggested regular expression][03] to validate whether the string is valid
      semver. This is the same pattern, made multi-line for easier readability:

      ```regex
      ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)
      (?:-(
        (?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)
        (?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))
      *))?
      (?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
      ```

      The first line matches the `major.minor.patch` components of the version. The middle lines
      match the pre-release components. The last line matches the build metadata component.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#version
      [02]: https://semver.org/
      [03]: https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
  capabilities:
    title: Adapted Resource Capabilities
    description: >-
      Defines the operations the adapted resource supports when invoked through the adapter.
    $ref: /<PREFIX>/<VERSION>/definitions/resourceCapabilities.yaml
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines the operations the adapted resource supports when invoked through the adapter. The
      adapter is responsible for implementing these operations on behalf of the adapted resource.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#capabilities
  condition:
    title: Condition
    description: >-
      Defines a DSC expression that evaluates to a boolean value. When the condition evaluates
      to false, DSC ignores the adapted resource.
    type: string
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines a DSC expression that evaluates to a boolean value. When the condition evaluates
      to `false`, DSC ignores the adapted resource. This enables conditional inclusion of adapted
      resources based on environment or configuration state.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#condition
  deprecationMessage:
    title: Deprecation Message
    description: >-
      Defines a message indicating the adapted resource is deprecated. When specified, DSC
      displays this message when the resource is used.
    type: string
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines a message indicating the adapted resource is deprecated. When specified, DSC
      displays this message as a warning when the resource is used in a configuration.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#deprecationmessage
  description:
    title: Adapted Resource Description
    description: >-
      A short synopsis of the adapted DSC resource's purpose.
    type: string
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines a short synopsis of the adapted DSC resource's purpose.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#description-1
  author:
    title: Adapted Resource Author
    description: >-
      The name of the person or organization that developed and maintains the adapted DSC resource.
    type: string
    markdownDescription: | # VS Code only
      ***
      [_Online Documentation_][01]
      ***

      Defines the name of the person or organization that developed and maintains the adapted DSC
      resource.

      [01]: <DOCS_BASE_URL>/reference/schemas/adaptedresource/manifest/root?<DOCS_VERSION_PIN>#author
  tags:
    title: Tags
    description: >-
